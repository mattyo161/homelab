name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  helm-validate:
    name: Helm template + kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: "3.17.0"

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz && sudo mv kubeconform /usr/local/bin/

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate Helm apps
        run: |
          set -e
          K8S_VERSION="1.34.0"
          FAILED=0

          for app_file in apps/argocd/apps/*.yml; do
            app_name=$(yq '.metadata.name' "$app_file")
            sources_count=$(yq '.spec.sources | length' "$app_file")

            # Skip non-Helm apps (single source, raw manifests)
            if [ "$sources_count" = "0" ] || [ "$sources_count" = "null" ]; then
              echo "⏭  Skipping $app_name (raw manifests)"
              continue
            fi

            chart_repo=$(yq '.spec.sources[0].repoURL' "$app_file")
            chart_name=$(yq '.spec.sources[0].chart' "$app_file")
            chart_version=$(yq '.spec.sources[0].targetRevision' "$app_file")
            release_name=$(yq '.spec.sources[0].helm.releaseName' "$app_file")
            namespace=$(yq '.spec.destination.namespace' "$app_file")
            values_file="apps/${app_name}/values.yml"

            if [ ! -f "$values_file" ]; then
              echo "⚠  No values file at $values_file for $app_name, skipping"
              continue
            fi

            echo "🔍 Validating $app_name ($chart_name@$chart_version)..."

            helm repo add "$app_name" "$chart_repo" --force-update -q
            helm repo update "$app_name"

            if helm template "$release_name" "$app_name/$chart_name" \
                --version "$chart_version" \
                --namespace "$namespace" \
                --values "$values_file" \
              | kubeconform \
                  -strict \
                  -ignore-missing-schemas \
                  -kubernetes-version "$K8S_VERSION" \
                  -summary; then
              echo "✅ $app_name passed"
            else
              echo "❌ $app_name failed"
              FAILED=1
            fi
          done

          exit $FAILED

  raw-manifest-validate:
    name: Raw manifest kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz && sudo mv kubeconform /usr/local/bin/

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate raw manifest apps
        run: |
          set -e
          K8S_VERSION="1.34.0"
          FAILED=0

          for app_file in apps/argocd/apps/*.yml; do
            app_name=$(yq '.metadata.name' "$app_file")
            sources_count=$(yq '.spec.sources | length' "$app_file")

            # Only process single-source raw manifest apps
            if [ "$sources_count" != "0" ] && [ "$sources_count" != "null" ]; then
              continue
            fi

            path=$(yq '.spec.source.path' "$app_file")

            if [ ! -d "$path" ]; then
              echo "⚠  Path $path not found for $app_name, skipping"
              continue
            fi

            echo "🔍 Validating $app_name (raw manifests at $path)..."

            if kubeconform \
                -strict \
                -ignore-missing-schemas \
                -kubernetes-version "$K8S_VERSION" \
                -summary \
                "$path"; then
              echo "✅ $app_name passed"
            else
              echo "❌ $app_name failed"
              FAILED=1
            fi
          done

          exit $FAILED
