---
# group_vars/all.yml
# Variables applied to all nodes

ansible_ssh_private_key_file: ~/.ssh/id_ed25519
ansible_python_interpreter: /usr/bin/python3

# Storage
usb_device: /dev/sda
k3s_partition_size: 20G
k3s_mount_point: /var/lib/rancher
longhorn_mount_point: /var/lib/longhorn

# rpi-connect
rpi_connect_user: matt
# Set per host in host_vars or pass via --extra-vars
# rpi_connect_auth_key: rpuak_xxxxxxxxxx

# k3s
k3s_version: "v1.29.0+k3s1"
k3s_config_dir: /etc/rancher/k3s
