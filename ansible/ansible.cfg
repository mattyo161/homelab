[defaults]
inventory = inventory/hosts.yml
remote_user = matt
host_key_checking = False
stdout_callback = ansible.builtin.default
callbacks_enabled = timer, profile_tasks

[callback_default]
result_format = yaml

[ssh_connection]
ssh_args = -o ForwardAgent=yes -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
