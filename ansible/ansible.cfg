[defaults]
inventory = inventory/hosts.yml
remote_user = matt
host_key_checking = False
# Vault-encrypted group_vars (e.g. group_vars/k3s_cluster/secrets.yml) load for all k3s_cluster hosts,
# including ad-hoc commands. Uncomment and create .vault_pass (gitignored) to skip --ask-vault-pass:
vault_password_file = .vault_pass
stdout_callback = ansible.builtin.default
callbacks_enabled = timer, profile_tasks

[callback_default]
result_format = yaml

[ssh_connection]
ssh_args = -o ForwardAgent=yes -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
