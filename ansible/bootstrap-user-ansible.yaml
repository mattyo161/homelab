---
- name: Bootstrap ansible automation user
  hosts: k3s_cluster
  become: true
  vars:
    ansible_user: matt # use the the name to authenticate with ssh
    ansible_user_pubkey: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') }}"
  tasks:
    - name: Ensure ansible user exists
      ansible.builtin.user:
        name: ansible
        system: true
        create_home: true
        shell: /bin/bash

    - name: ansible user authorized_keys
      ansible.builtin.authorized_key:
        user: ansible
        state: present
        key: "{{ ansible_user_pubkey }}"

    - name: Passwordless sudo for ansible (adjust rule to your policy)
      ansible.builtin.copy:
        dest: /etc/sudoers.d/99-ansible
        mode: "0440"
        owner: root
        group: root
        content: |
          ansible ALL=(ALL) NOPASSWD:ALL
        validate: /usr/sbin/visudo -cf %s