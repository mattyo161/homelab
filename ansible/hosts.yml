---
# Writes cluster server IPs to /etc/hosts on targeted nodes.
#
# Uses blockinfile to atomically replace the cluster endpoint block in a
# single file write — no window where cluster.oue.home is missing.
#
# Usage:
#   ansible-playbook hosts.yml                    # all cluster nodes
#   ansible-playbook hosts.yml --limit mou-pi5    # single node (servers auto-included for facts)
#
- name: Configure /etc/hosts for HA cluster endpoint
  hosts: k3s_cluster
  gather_facts: true
  become: true
  tasks:
    - name: Gather facts from server nodes (for IP lookup)
      # Delegates setup to each server so their IPs are in hostvars even when
      # --limit excludes the server group.
      ansible.builtin.setup:
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['server'] }}"
      run_once: true

    - name: Write cluster server IPs to /etc/hosts (atomic block replace)
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED: {{ api_endpoint }}"
        block: |
          {% for host in groups['server'] %}
          {{ hostvars[host]['ansible_facts']['default_ipv4']['address'] }} {{ api_endpoint }}
          {% endfor %}
