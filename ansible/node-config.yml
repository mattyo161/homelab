---
# node-config.yml
# Applies node labels and taints declared in inventory/host_vars/<node>/main.yml
#
# Run after k3s is up (Phase 4 of site.yml). Can be run standalone
# at any time to reconcile node config with git state.
#
# Usage:
#   # All nodes:
#   ansible-playbook -i inventory/hosts.yml node-config.yml
#
#   # Single node (useful when adding/changing one node's role):
#   ansible-playbook -i inventory/hosts.yml node-config.yml --limit mou-mini4
#
#   # Dry run:
#   ansible-playbook -i inventory/hosts.yml node-config.yml --check
#
# To change a node's role:
#   1. Edit inventory/host_vars/<node>/main.yml
#   2. Run this playbook
#   3. Commit and push — git is now the source of truth
#
# To wipe and rebuild the cluster:
#   1. Run site.yml (provisions k3s)
#   2. Run node-config.yml (applies labels/taints)
#   3. ArgoCD syncs apps (picks up labels via affinity rules)
#   → Cluster matches git state exactly

- name: Apply node labels and taints
  hosts: k3s_cluster
  gather_facts: false    # no facts needed — we're just applying k8s config
  tags: node-config

  pre_tasks:
    - name: Verify cluster is reachable
      command: kubectl get nodes --no-headers
      delegate_to: "{{ groups['server'][0] }}"
      become: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      run_once: true
      changed_when: false

  roles:
    - node_config
