---
# roles/common/tasks/main.yml
# Applied to all nodes managed by this repo

- name: Disable IPv6
  sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6

# udpate cache
- name: Update Package Cache
  ansible.builtin.package:
    state: present
    update_cache: true
    cache_valid_time: 3600 # only update if the cache is older than 1 hour

# standard packages
- name: Install required packages
  ansible.builtin.package:
    name:
      - iputils-ping
      - dnsutils
      - curl
      - wget
      - net-tools
      - traceroute
      - vim
    state: present
    update_cache: false
    
