---
# site.yml
# Main playbook — provisions all nodes in the correct order
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml site.yml
#
# Run specific phases:
#   ansible-playbook -i inventory/hosts.yml site.yml --tags common
#   ansible-playbook -i inventory/hosts.yml site.yml --tags storage
#   ansible-playbook -i inventory/hosts.yml site.yml --tags rpi_connect
#
# k3s is provided by collection k3s.orchestration (see Phase 4 below). For k3s-only runs or
# kubeconfig refresh, use the collection playbook directly (README.md).
#
# Dry run:
#   ansible-playbook -i inventory/hosts.yml site.yml --check

# Phase 1 — Common setup on all nodes
- name: Common node setup
  hosts: k3s_cluster
  become: true
  tags: common
  roles:
    - common

# Phase 2 — Storage setup: discover and mount DATA partitions on all nodes
- name: Storage setup
  hosts: k3s_cluster
  become: true
  tags: storage
  roles:
    - storage

# Phase 3 — rpi-connect on all nodes
# - name: rpi-connect setup
#   hosts: k3s_cluster
#   become: true
#   tags: rpi_connect
#   roles:
#     - rpi_connect

# Update /etc/hosts for HA cluster endpoint
- import_playbook: hosts.yml

# Phase 4 — k3s cluster (official k3s-io/k3s-ansible collection)
- import_playbook: k3s.orchestration.site
