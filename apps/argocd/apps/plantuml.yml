---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plantuml
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://stevehipwell.github.io/helm-charts/
      chart: plantuml
      targetRevision: "3.46.0"
      helm:
        releaseName: plantuml
        valueFiles:
          - $values/apps/plantuml/values.yml
    - repoURL: https://github.com/mattyo161/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: plantuml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
