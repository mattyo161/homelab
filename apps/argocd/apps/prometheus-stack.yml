---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # Pin the chart version — update here to upgrade
    targetRevision: "69.2.0"
    helm:
      releaseName: prometheus-stack
      valueFiles:
        - $values/apps/prometheus-stack/values.yml
  # Second source provides the values file from this repo
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "69.2.0"
      helm:
        releaseName: prometheus-stack
        valueFiles:
          - $values/apps/prometheus-stack/values.yml
    - repoURL: https://github.com/mattyo161/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required for kube-prometheus-stack CRDs
