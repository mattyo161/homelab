# Self-signed ClusterIssuer chain
#
# This creates two resources:
#   1. A self-signed issuer (used only to bootstrap the CA cert)
#   2. A CA Certificate (selfsigned-ca) issued by the bootstrap issuer
#   3. A CA ClusterIssuer (selfsigned-cluster-issuer) that uses the CA cert
#
# All Ingress resources in apps.yml reference selfsigned-cluster-issuer.
# The CA certificate can be exported and trusted in browsers:
#   kubectl get secret -n cert-manager selfsigned-ca-secret \
#     -o jsonpath='{.data.ca\.crt}' | base64 -d > ca.crt
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: selfsigned-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: oue-homelab-ca
  secretName: selfsigned-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-cluster-issuer
spec:
  ca:
    secretName: selfsigned-ca-secret
