# GitLab Helm values
# Chart: gitlab/gitlab
# Repo: https://charts.gitlab.io
#
# Split deployment across two nodes:
#   mou-mini4 (15.5G RAM) — stateful components: Gitaly, PostgreSQL, MinIO, Redis
#                            already running ArgoCD, cert-manager, Longhorn, MetalLB
#                            Longhorn instance-manager is here so volume I/O stays local
#   mou-pc1   ( 5.7G RAM) — stateless components: Webservice, Sidekiq, Registry
#                            3+ GiB free, 4 CPUs, control plane but lightly loaded
#
# Runner job pods spread across mou-mini3 / mou-mini5 (see gitlab-runner/values.yml)
# mou-pi5 excluded via taint (ARM64, amd64-only images)
#
# Ingress: Traefik + cert-manager (selfsigned-cluster-issuer)
# Storage: Longhorn (default storageClass)
# Domain:  gitlab.oue.home
#
# Prerequisites before ArgoCD sync:
#   kubectl label node mou-mini4 role=gitlab-storage
#   kubectl label node mou-pc1   role=gitlab-app
#   kubectl taint node mou-pi5 arch=arm64:NoSchedule
#
# First-time password retrieval after sync:
#   kubectl get secret gitlab-gitlab-initial-root-password \
#     -n gitlab -ojsonpath='{.data.password}' | base64 --decode; echo

# =============================================================================
# GLOBAL
# =============================================================================
global:
  edition: ce    # Community Edition — free, no license needed

  hosts:
    domain: oue.home
    https: true
    gitlab:
      name: gitlab.oue.home
    registry:
      name: registry.oue.home
    minio:
      name: minio.oue.home

  ingress:
    class: traefik
    annotations:
      cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    configureCertmanager: false   # we use our own cert-manager, not GitLab's
    tls:
      enabled: true

  # GitLab uses its own internal PostgreSQL and Redis for this homelab setup.
  # For production you'd externalise these — noted in comments below.
  postgresql:
    install: true
  redis:
    install: true

  # Object storage via bundled MinIO (evaluation/homelab only).
  # Production: point at external S3-compatible store.
  minio:
    enabled: true

  # Prometheus integration — scrape GitLab metrics into your existing stack.
  # After deploy, add a ServiceMonitor or scrape config in prometheus-stack values.
  prometheus:
    install: false   # use your existing prometheus-stack, not a second instance

  # ==========================================================================
  # NODE AFFINITY — global default, individual components override below
  # Two labels in use:
  #   role=gitlab-storage → mou-mini4 (Gitaly, PostgreSQL, MinIO, Redis)
  #   role=gitlab-app     → mou-pc1   (Webservice, Sidekiq, Registry)
  # ==========================================================================
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: role
                operator: In
                values:
                  - gitlab-storage
                  - gitlab-app

  # Tolerate nothing on the Pi — belt and suspenders with the taint
  tolerations: []

# =============================================================================
# CERT-MANAGER
# Already installed in your cluster — disable GitLab's bundled version
# =============================================================================
certmanager:
  install: false

# =============================================================================
# NGINX INGRESS
# Already using Traefik — disable GitLab's bundled nginx
# =============================================================================
nginx-ingress:
  enabled: false

# =============================================================================
# GITLAB WEBSERVICE
# The main HTTP/API component. Most RAM-hungry after Gitaly.
# =============================================================================
gitlab:
  webservice:
    replicaCount: 1    # scale to 2 when you want HA
    resources:
      requests:
        cpu: 300m
        memory: 1.5Gi
      limits:
        cpu: "2"
        memory: 3Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - gitlab-app

  # ==========================================================================
  # SIDEKIQ — background job processor
  # Handles emails, webhooks, pipeline scheduling, housekeeping
  # ==========================================================================
  sidekiq:
    replicaCount: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - gitlab-app

  # ==========================================================================
  # GITALY — git repository storage daemon
  # Handles all git operations. Needs fast storage — Longhorn handles this.
  # ==========================================================================
  gitaly:
    replicaCount: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1.5Gi
    persistence:
      storageClass: longhorn
      size: 20Gi         # git repository data — increase as repos grow
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - gitlab-storage

  # ==========================================================================
  # GITLAB SHELL — SSH git operations
  # ==========================================================================
  gitlab-shell:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # ==========================================================================
  # GITLAB EXPORTER — Prometheus metrics
  # Exposes GitLab application metrics for your existing Prometheus
  # ==========================================================================
  gitlab-exporter:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # ==========================================================================
  # MIGRATIONS — one-shot job that runs DB migrations on upgrade
  # ==========================================================================
  migrations:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

# =============================================================================
# POSTGRESQL (bundled)
# Fine for homelab. For production: use external managed Postgres.
# =============================================================================
postgresql:
  primary:
    persistence:
      storageClass: longhorn
      size: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - gitlab-storage

# =============================================================================
# REDIS (bundled)
# =============================================================================
redis:
  master:
    persistence:
      storageClass: longhorn
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - gitlab-storage

# =============================================================================
# MINIO (bundled object storage)
# Stores CI artifacts, LFS objects, uploads, registry layers
# =============================================================================
minio:
  persistence:
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: role
                operator: In
                values:
                  - gitlab-storage

# =============================================================================
# REGISTRY — container image registry
# =============================================================================
registry:
  enabled: true
  storage:
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# PROMETHEUS (GitLab's bundled one — disabled, use yours)
# =============================================================================
prometheus:
  install: false
