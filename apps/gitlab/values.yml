# GitLab Helm values — minimal working config
# Chart: gitlab/gitlab 9.10.3 → GitLab 18.10.3
# Start minimal, validate sync, then add affinity/resources/storage config.

global:
  edition: ce
  hosts:
    domain: oue.home
    https: true
  ingress:
    class: traefik
    configureCertmanager: false
    tls:
      enabled: true
    annotations:
      cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
      traefik.ingress.kubernetes.io/router.entrypoints: websecure

certmanager:
  enabled: false

nginx-ingress:
  enabled: false

prometheus:
  install: false

upgradeCheck:
  enabled: false