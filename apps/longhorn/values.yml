# Longhorn Helm values
# Chart: longhorn/longhorn
# Repo: https://charts.longhorn.io
#
# Longhorn provides replicated block storage across cluster nodes.
# Prerequisite: open-iscsi must be installed on all nodes (handled by apps.yml).

defaultSettings:
  # Number of replicas for each volume — 2 is a good balance for a 3-server cluster
  defaultReplicaCount: 2
  # Use the DATA1 mount point created by the storage role on each node.
  # Nodes without a DATA1 mount fall back to the Longhorn default (/var/lib/longhorn).
  # The storage role mounts DATA partitions at /mnt/data/<LABEL> on each node.
  defaultDataPath: /mnt/data/DATA1
  logLevel: Warn
  # Do not schedule replicas on cordoned nodes (e.g. mou-mini1 control plane).
  disableSchedulingOnCordonedNode: true
  # Rebalance replicas off nodes that are disabled or overcrowded.
  replicaAutoBalance: least-effort
  # Nodes excluded from scheduling are enforced by ansible/apps.yml
  # (longhorn_excluded_nodes in group_vars/k3s_cluster/main.yml).

# StorageClass replica count — this (not defaultReplicaCount above) controls
# volumes created via PVC. Chart default is 3; only mini4/mini5 have large
# schedulable disks, so 3 replicas would leave every new volume degraded.
persistence:
  defaultClassReplicaCount: 2

# Ingress for the Longhorn UI
ingress:
  enabled: true
  ingressClassName: traefik
  host: longhorn.oue.home
  tls: true
  tlsSecret: longhorn-tls
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure

# Resource limits
longhornManager:
  tolerations: []
