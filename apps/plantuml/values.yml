# PlantUML Server Helm values
# Chart: stevehipwell/plantuml
# Repo: https://stevehipwell.github.io/helm-charts/

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: plantuml.oue.home
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: plantuml-tls
      hosts:
        - plantuml.oue.home

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 60

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
