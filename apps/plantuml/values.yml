# PlantUML Server Helm values
# Chart: stevehipwell/plantuml
# Repo: https://github.com/stevehipwell/helm-charts/tree/main/charts/plantuml

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
    # web + websecure: allow plain HTTP for clients that can't handle the
    # self-signed cert (e.g. Obsidian plugins)
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  hosts:
    - plantuml.oue.home
  path: /
  tls:
    - hosts:
        - plantuml.oue.home
      secretName: plantuml-tls

# Probes render a real diagram (/png) which is slow on a cold JVM —
# generous delays/timeouts prevent restart loops on slower nodes
livenessProbe:
  httpGet:
    path: /svg/SyfFKj2rKt3CoKnELR1Io4ZDoSa70000
    port: 8080
  initialDelaySeconds: 30  # give JVM more time to start
  periodSeconds: 30        # check every 30s
  failureThreshold: 5      # must fail 5 times before marked unready and restarted
  timeoutSeconds: 10       # timeout after 10s
readinessProbe:
  httpGet:
    path: /svg/SyfFKj2rKt3CoKnELR1Io4ZDoSa70000
    port: 8080
  initialDelaySeconds: 15  # wait 15s before first check
  periodSeconds: 5         # check every 5s
  failureThreshold: 3      # must fail 3 times before marked unready
  successThreshold: 1      # only needs 1 success to be marked ready
  timeoutSeconds: 10       # timeout after 10s

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 60
  # Don't scale on short-lived spikes (e.g. JVM startup)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 120

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
