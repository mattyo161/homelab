# Traefik Helm values
# Chart: traefik/traefik
# Repo: https://traefik.github.io/charts
#
# k3s ships Traefik v2 via HelmChart CR. This release replaces it with Traefik v3
# installed via the official Helm chart so we have full control over values.
#
# IMPORTANT: Before running apps.yml, disable the built-in Traefik by adding to
# k3s server config (managed in k3s_server_config via group_vars):
#   disable: ["traefik"]
# Then re-run site.yml to apply, before running apps.yml.
# See apps/traefik/README.md for the migration steps.

# Use the MetalLB-assigned IP for the LoadBalancer service
service:
  type: LoadBalancer
  annotations:
    # Pin to the first IP in the MetalLB pool so DNS is stable
    metallb.universe.tf/loadBalancerIPs: "192.168.5.200"

# Expose ports
ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    # Redirect all HTTP to HTTPS
    redirections:
      entryPoint:
        to: websecure
        scheme: https
        permanent: true
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    tls:
      enabled: true
  # Traefik dashboard port (internal only — exposed via IngressRoute below)
  traefik:
    port: 9000
    expose:
      default: false

# Enable dashboard (secured by IngressRoute in apps.yml)
ingressRoute:
  dashboard:
    enabled: false   # we create our own IngressRoute with TLS

# Cert-manager integration — allow Traefik to read TLS secrets across namespaces
providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
    allowExternalNameServices: true
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: true
    publishedService:
      enabled: true

# Logging
logs:
  general:
    level: INFO
  access:
    enabled: true

# Resource limits — conservative for homelab
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
