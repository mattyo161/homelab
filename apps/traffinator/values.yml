# Traffinator — predictive commute-time analyzer (Django API + React SPA + Postgres)
# Chart: oci://ghcr.io/mattyo161/charts/traffinator (published from the
# traffinator repo's release CI).
#
# Deploying a new release is a single knob: bump `targetRevision` in
# apps/argocd/apps/traffinator.yml. That selects the chart version, and the
# chart defaults each image tag to its appVersion — so the matching app images
# come along automatically. (Image tags are intentionally not overridden here.)
#
# Secrets are created by ansible/apps.yml (tag: traffinator-secrets) in the
# `traffinator` namespace and referenced via secrets.existingSecret. The chart's
# built-in secret generation uses a Helm `lookup` that ArgoCD's `helm template`
# can't honor, so it would regenerate the Django key / Postgres password on
# every sync — hence the external secret.

secrets:
  existingSecret: traffinator-secrets

ingress:
  enabled: true
  className: traefik
  host: traffinator.oue.home
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  tls:
    enabled: true
    secretName: traffinator-tls

# Database: CloudNativePG Cluster (operator in cnpg-system). HA across 2
# instances on Longhorn. The backend gets DATABASE_URL from the CNPG-managed
# traffinator-postgres-app secret automatically.
#   - pgAudit session auditing -> Postgres stdout -> Vector -> Loki/BetterStack
#   - DB metrics via PodMonitor into the existing kube-prometheus-stack
postgres:
  mode: cnpg
  cnpg:
    instances: 2
    storage:
      size: 5Gi
      storageClass: longhorn
    monitoring:
      enablePodMonitor: true
    pgaudit:
      enabled: true
      log: "write,ddl,role"   # audited statement classes (pgaudit.log)
      logCatalog: false        # off avoids noisy system-catalog reads
